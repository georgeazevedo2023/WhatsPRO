name: Vault & Schema Healthcheck

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check-md-length:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no .md file exceeds 300 lines
        run: bash scripts/check-md-length.sh --strict

  check-schema-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check view/table .select() columns exist in types.ts
        run: node scripts/check-view-selects.mjs --strict
